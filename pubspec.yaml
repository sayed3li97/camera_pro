name: camera_pro
description: >-
  DSLR-grade camera controls with a native C/C++ core over Dart FFI. Capability-
  aware, crash-proof API with manual exposure, focus, and white balance.
version: 0.0.2
repository: https://github.com/sayed3li97/camera_pro
issue_tracker: https://github.com/sayed3li97/camera_pro/issues
topics:
  - camera
  - ffi
  - photography
  - native

environment:
  sdk: ^3.9.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  meta: ^1.15.0
  web: ^1.1.0   # getUserMedia / MediaDevices for the web backend

  # Native-assets build-hook toolchain. These power hook/build.dart, which
  # compiles the shared C core (src/core + src/platform/stub) into a code asset
  # during `flutter run`/`build`. See ARCHITECTURE.md → "Build system".
  hooks: ^2.0.0
  code_assets: ^1.2.0
  native_toolchain_c: ^0.19.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  ffigen: ^20.0.0

flutter:
