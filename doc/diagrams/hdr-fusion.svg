<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1180 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Berkeley Mono','JetBrains Mono','SF Mono',ui-monospace,monospace">
  <title>camera_pro HDR exposure fusion</title>
  <desc>captureHdr captures a minus-two, zero, plus-two EV bracket and fuses it with single-scale Mertens fusion: per pixel, each exposure is weighted by well-exposedness times saturation, so highlights come from the dark frame and shadows from the bright frame, producing one balanced tone-mapped image.</desc>
  <defs>
    <filter id="gh" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
    <linearGradient id="bal" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#141a24"/><stop offset="1" stop-color="#c9d3e0"/>
    </linearGradient>
    <style>
      .node{animation:in .5s ease both}@keyframes in{from{opacity:0}to{opacity:1}}
      .flow{stroke-dasharray:3 9;animation:fl 1.3s linear infinite}@keyframes fl{to{stroke-dashoffset:-24}}
      .t{fill:#cbd2dc;font-size:15px}.s{fill:#6a7482;font-size:11.5px}
      .lane{fill:#4b5462;font-size:12px;letter-spacing:2px}.cap{fill:#8b93a1;font-size:14px}.acc{fill:#4a9eff}
      .num{fill:#8b93a1;font-size:12px}
    </style>
  </defs>
  <rect width="1180" height="480" rx="18" fill="#0a0d13"/>
  <rect x="10" y="10" width="1160" height="460" rx="16" fill="none" stroke="#1a2230"/>

  <text class="lane" x="60" y="74">EV BRACKET  ·  captureHdr([-2, 0, +2])</text>

  <!-- three exposures -->
  <g class="node" style="animation-delay:.1s">
    <rect x="70" y="96" width="150" height="70" rx="8" fill="#10141d" stroke="#2a3442"/>
    <text class="t" x="90" y="128">-2 EV</text>
    <text class="s" x="90" y="150">highlights hold</text>
  </g>
  <g class="node" style="animation-delay:.24s">
    <rect x="70" y="196" width="150" height="70" rx="8" fill="#2a3442" stroke="#3a4656"/>
    <text class="t" x="90" y="228">0 EV</text>
    <text class="s" x="90" y="250">midtones</text>
  </g>
  <g class="node" style="animation-delay:.38s">
    <rect x="70" y="296" width="150" height="70" rx="8" fill="#c9d3e0" stroke="#e6ecf5"/>
    <text x="90" y="328" fill="#0a0d13" font-size="15">+2 EV</text>
    <text x="90" y="350" fill="#37414f" font-size="11.5">shadows open</text>
  </g>

  <!-- connectors into the fuse node -->
  <g stroke="#37414f" stroke-width="1.4" fill="none">
    <path d="M220,131 C 320,131 330,205 430,205"/>
    <path d="M220,231 H430"/>
    <path d="M220,331 C 320,331 330,255 430,255"/>
  </g>

  <!-- fuse node -->
  <g class="node" style="animation-delay:.55s">
    <rect x="430" y="168" width="290" height="124" rx="12" fill="#0e131c" stroke="#4a9eff"/>
    <text class="t" x="575" y="200" text-anchor="middle">Mertens fusion · per pixel</text>
    <text class="s" x="575" y="224" text-anchor="middle">weight = well-exposedness × saturation</text>
    <line x1="454" y1="240" x2="696" y2="240" stroke="#1e2634"/>
    <text class="num" x="575" y="262" text-anchor="middle">highlights ← <tspan class="acc">-2</tspan>   ·   shadows ← <tspan fill="#c9d3e0">+2</tspan></text>
    <text class="s" x="575" y="282" text-anchor="middle">C core (double) ≡ pure-Dart web · ±1 LSB</text>
  </g>

  <!-- fused output -->
  <path d="M720,230 H900" stroke="#4a9eff" stroke-width="1.4" fill="none" opacity=".6" class="flow"/>
  <g class="node" style="animation-delay:.72s">
    <text class="s" x="1010" y="150" text-anchor="middle">fused · tone-mapped</text>
    <rect x="900" y="160" width="220" height="150" rx="12" fill="url(#bal)" stroke="#3a4656"/>
    <circle cx="922" cy="182" r="4" fill="#e0526a"/><text x="936" y="186" fill="#0a0d13" font-size="11">HDR</text>
  </g>

  <!-- flow dot -->
  <circle r="4.5" fill="#4a9eff" filter="url(#gh)">
    <animateMotion dur="4.4s" repeatCount="indefinite" calcMode="linear"
      path="M145,131 L430,205 L575,230 L900,235 L1010,235"/>
  </circle>

  <text class="cap" x="60" y="420">One tap: <tspan class="acc">captureHdr()</tspan> brackets, then fuses — shadows from the bright frame, highlights from the dark.</text>
  <text class="cap" x="60" y="446">Verified live on the FaceTime HD camera: a 77%-crushed-black frame → <tspan class="acc">0% crushed · mean luma 9 → 94</tspan>.</text>
</svg>
