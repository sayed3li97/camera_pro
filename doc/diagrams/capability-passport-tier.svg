<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1180 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Berkeley Mono','JetBrains Mono','SF Mono',ui-monospace,monospace">
  <title>camera_pro capability passport to tier</title>
  <desc>The backend reports each feature as Supported or NotSupported; determineTier maps the passport to Full, Standard, or Basic.</desc>
  <style>
    .node{animation:in .5s ease both}
    @keyframes in{from{opacity:0}to{opacity:1}}
    .pulse{animation:pl 2.4s ease-in-out infinite}
    @keyframes pl{0%,100%{stroke-opacity:1}50%{stroke-opacity:.4}}
    .t{fill:#cbd2dc;font-size:15px}.s{fill:#6a7482;font-size:12px}
    .lane{fill:#4b5462;font-size:12px;letter-spacing:2px}
    .leg{fill:#565f6e;font-size:12px}.cap{fill:#8b93a1;font-size:14px}.acc{fill:#4a9eff}
  </style>
  <rect width="1180" height="540" rx="18" fill="#0a0d13"/>
  <rect x="10" y="10" width="1160" height="520" rx="16" fill="none" stroke="#1a2230"/>

  <g class="node" style="animation-delay:.05s">
    <rect x="60" y="228" width="170" height="66" rx="10" fill="#0e131c" stroke="#2a3442"/>
    <text class="t" x="145" y="256" text-anchor="middle">Backend</text>
    <text class="s" x="145" y="276" text-anchor="middle">device caps</text>
  </g>
  <path d="M230,261 H300" stroke="#37414f" stroke-width="1.4" fill="none"/>

  <rect x="300" y="96" width="360" height="352" rx="14" fill="#0b0f17" stroke="#2a3442"/>
  <text class="lane" x="330" y="132">CAPABILITY  PASSPORT</text>
  <line x1="322" y1="150" x2="638" y2="150" stroke="#1e2634"/>
  <g class="s" font-size="14" fill="#cbd2dc">
    <g class="node" style="animation-delay:.2s"><circle cx="606" cy="185" r="6" fill="#4a9eff"/><text x="332" y="190">ISO</text></g>
    <g class="node" style="animation-delay:.35s"><circle cx="606" cy="230" r="6" fill="#4a9eff"/><text x="332" y="235">Shutter</text></g>
    <g class="node" style="animation-delay:.5s"><circle cx="606" cy="275" r="6" fill="#4a9eff"/><text x="332" y="280">White balance</text></g>
    <g class="node" style="animation-delay:.65s"><circle cx="606" cy="320" r="6" fill="#4a9eff"/><text x="332" y="325">Focus</text></g>
    <g class="node" style="animation-delay:.8s"><circle cx="606" cy="365" r="6" fill="#4a9eff"/><text x="332" y="370">Zoom</text></g>
    <g class="node" style="animation-delay:.95s"><circle cx="606" cy="410" r="6" fill="none" stroke="#4b5462"/><text x="332" y="415" fill="#6a7482">Aperture</text></g>
  </g>

  <path d="M660,272 H720" stroke="#37414f" stroke-width="1.4" fill="none"/>
  <g class="node" style="animation-delay:1.05s">
    <rect x="720" y="239" width="180" height="66" rx="10" fill="#0e131c" stroke="#2a3442"/>
    <text class="t" x="810" y="267" text-anchor="middle">determineTier()</text>
    <text class="s" x="810" y="287" text-anchor="middle">pure function</text>
  </g>
  <path d="M900,262 C 928,262 928,180 950,180" stroke="#4a9eff" stroke-width="1.4" fill="none" opacity=".6"/>

  <g class="node" style="animation-delay:1.2s">
    <rect class="pulse" x="950" y="150" width="185" height="58" rx="10" fill="#0e131c" stroke="#4a9eff"/>
    <text class="t" x="1042" y="184" text-anchor="middle" fill="#e6ecf5">Full manual (DSLR)</text>
  </g>
  <rect x="950" y="228" width="185" height="52" rx="10" fill="#0b0f17" stroke="#222b39"/>
  <text class="s" x="1042" y="259" text-anchor="middle">Standard</text>
  <rect x="950" y="300" width="185" height="52" rx="10" fill="#0b0f17" stroke="#222b39"/>
  <text class="s" x="1042" y="331" text-anchor="middle">Basic</text>

  <text class="leg" x="330" y="490"><tspan fill="#4a9eff">●</tspan> Supported      <tspan fill="#4b5462">○</tspan> NotSupported (with a reason)</text>
  <text class="cap" x="60" y="520">iso + shutter + focus + white balance all supported  <tspan class="acc">→ Full</tspan></text>
</svg>
