<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1180 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Berkeley Mono','JetBrains Mono','SF Mono',ui-monospace,monospace">
  <title>camera_pro burst and EV bracket</title>
  <desc>captureBurst fires five frames in about 1.2 seconds; captureExposureBracket takes three frames at minus two, zero, and plus two EV with measured mean luminance.</desc>
  <style>
    .fr{animation:pop .5s ease both}@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .t{fill:#cbd2dc;font-size:15px}.s{fill:#6a7482;font-size:11.5px}.cap{fill:#8b93a1;font-size:14px}.acc{fill:#4a9eff}
    .lane{fill:#4b5462;font-size:12px;letter-spacing:2px}.num{fill:#8b93a1;font-size:12px}
  </style>
  <rect width="1180" height="470" rx="18" fill="#0a0d13"/>
  <rect x="10" y="10" width="1160" height="450" rx="16" fill="none" stroke="#1a2230"/>

  <text class="lane" x="60" y="80">BURST  ·  captureBurst(5)</text>
  <line x1="60" y1="176" x2="1120" y2="176" stroke="#222a39"/>
  <g>
    <g class="fr" style="animation-delay:.10s"><rect x="90" y="112" width="60" height="48" rx="6" fill="#141a24" stroke="#2a3442"/></g>
    <g class="fr" style="animation-delay:.24s"><rect x="176" y="112" width="60" height="48" rx="6" fill="#141a24" stroke="#2a3442"/></g>
    <g class="fr" style="animation-delay:.38s"><rect x="262" y="112" width="60" height="48" rx="6" fill="#141a24" stroke="#2a3442"/></g>
    <g class="fr" style="animation-delay:.52s"><rect x="348" y="112" width="60" height="48" rx="6" fill="#141a24" stroke="#2a3442"/></g>
    <g class="fr" style="animation-delay:.66s"><rect x="434" y="112" width="60" height="48" rx="6" fill="#141a24" stroke="#2a3442"/></g>
  </g>
  <path d="M90,190 H494" stroke="#37414f" stroke-width="1.2" fill="none"/>
  <path d="M90,186 V194 M494,186 V194" stroke="#37414f" stroke-width="1.2"/>
  <text class="num" x="292" y="212" text-anchor="middle" fill="#4a9eff">5 shots ≈ 1.2 s</text>

  <text class="lane" x="60" y="278">EV BRACKET  ·  captureExposureBracket([-2, 0, +2])</text>
  <g>
    <g class="fr" style="animation-delay:.8s"><rect x="120" y="308" width="110" height="76" rx="8" fill="#0f1420" stroke="#2a3442"/><text class="t" x="175" y="352" text-anchor="middle">-2</text><text class="num" x="175" y="404" text-anchor="middle">YAVG 25.8</text></g>
    <g class="fr" style="animation-delay:.95s"><rect x="330" y="308" width="110" height="76" rx="8" fill="#2a3442" stroke="#3a4656"/><text class="t" x="385" y="352" text-anchor="middle">0</text><text class="num" x="385" y="404" text-anchor="middle">YAVG 96.9</text></g>
    <g class="fr" style="animation-delay:1.1s"><rect x="540" y="308" width="110" height="76" rx="8" fill="#c9d3e0" stroke="#e6ecf5"/><text x="595" y="352" text-anchor="middle" fill="#0a0d13" font-size="15">+2</text><text class="num" x="595" y="404" text-anchor="middle">YAVG 183.4</text></g>
  </g>

  <text class="cap" x="720" y="352">Both run through the normal capture path.</text>
  <text class="cap" x="720" y="378"><tspan class="acc">measured</tspan> mean luminance, verified live.</text>
</svg>
