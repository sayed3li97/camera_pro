<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1180 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Berkeley Mono','JetBrains Mono','SF Mono',ui-monospace,monospace">
  <title>camera_pro digital manual-control pipeline</title>
  <desc>When the camera exposes no sensor controls, the setters map to digital state applied per frame in the C core, so every control still works and the tier is Full.</desc>
  <defs>
    <filter id="g4" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
    <style>
      .node{animation:in .5s ease both}@keyframes in{from{opacity:0}to{opacity:1}}
      .flow{stroke-dasharray:3 9;animation:fl 1.3s linear infinite}@keyframes fl{to{stroke-dashoffset:-24}}
      .warm{animation:warm 5s ease-in-out infinite}@keyframes warm{0%,100%{fill:#141a24}50%{fill:#2b2016}}
      .t{fill:#cbd2dc;font-size:15px}.s{fill:#6a7482;font-size:11.5px}
      .lane{fill:#4b5462;font-size:12px;letter-spacing:2px}.cap{fill:#8b93a1;font-size:14px}.acc{fill:#4a9eff}
      .rowl{fill:#9aa3b1;font-size:13px}
    </style>
  </defs>
  <rect width="1180" height="520" rx="18" fill="#0a0d13"/>
  <rect x="10" y="10" width="1160" height="500" rx="16" fill="none" stroke="#1a2230"/>

  <rect x="52" y="96" width="230" height="330" rx="14" fill="#0b0f17" stroke="#2a3442"/>
  <text class="lane" x="80" y="132">CONTROLLER  SETTERS</text>
  <line x1="74" y1="150" x2="260" y2="150" stroke="#1e2634"/>
  <g class="rowl">
    <g class="node" style="animation-delay:.15s"><text x="82" y="192">setIso</text><rect x="180" y="182" width="70" height="6" rx="3" fill="#1c2430"/><circle cx="235" cy="185" r="6" fill="#4a9eff"/></g>
    <g class="node" style="animation-delay:.28s"><text x="82" y="238">setExposure</text><rect x="180" y="228" width="70" height="6" rx="3" fill="#1c2430"/><circle cx="222" cy="231" r="6" fill="#4a9eff"/></g>
    <g class="node" style="animation-delay:.41s"><text x="82" y="284">setWhiteBalance</text><rect x="180" y="274" width="70" height="6" rx="3" fill="#1c2430"/><circle cx="205" cy="277" r="6" fill="#4a9eff"/></g>
    <g class="node" style="animation-delay:.54s"><text x="82" y="330">setFocus</text><rect x="180" y="320" width="70" height="6" rx="3" fill="#1c2430"/><circle cx="215" cy="323" r="6" fill="#4a9eff"/></g>
    <g class="node" style="animation-delay:.67s"><text x="82" y="376">setZoom</text><rect x="180" y="366" width="70" height="6" rx="3" fill="#1c2430"/><circle cx="198" cy="369" r="6" fill="#4a9eff"/></g>
  </g>

  <path d="M282,261 H340" stroke="#37414f" stroke-width="1.4" fill="none"/>
  <g class="node" style="animation-delay:.8s">
    <rect x="340" y="228" width="210" height="66" rx="10" fill="#0e131c" stroke="#2a3442"/>
    <text class="t" x="445" y="256" text-anchor="middle">digital state</text>
    <text class="s" x="445" y="276" text-anchor="middle">gain · bias · temp · blur · zoom</text>
  </g>
  <path d="M550,261 H610" stroke="#4a9eff" stroke-width="1.4" fill="none" opacity=".6" class="flow"/>
  <g class="node" style="animation-delay:.92s">
    <rect x="610" y="228" width="230" height="66" rx="10" fill="#0e131c" stroke="#2a3442"/>
    <text class="t" x="725" y="256" text-anchor="middle">C core · per frame</text>
    <text class="s" x="725" y="276" text-anchor="middle">adjust · zoom · box blur</text>
  </g>

  <path d="M840,261 H892" stroke="#37414f" stroke-width="1.4" fill="none"/>
  <g class="node" style="animation-delay:1.05s">
    <text class="s" x="952" y="176" text-anchor="middle">raw</text>
    <rect x="892" y="186" width="120" height="90" rx="10" fill="#141a24" stroke="#232b3a"/>
    <text class="s" x="1092" y="176" text-anchor="middle">adjusted</text>
    <rect class="warm" x="1030" y="186" width="120" height="90" rx="10" stroke="#3a2c1a"/>
    <text x="952" y="300" text-anchor="middle" fill="#565f6e" font-size="11">before</text>
    <text x="1090" y="300" text-anchor="middle" fill="#4a9eff" font-size="11">after</text>
  </g>

  <circle r="4.5" fill="#4a9eff" filter="url(#g4)">
    <animateMotion dur="4s" repeatCount="indefinite" calcMode="linear" path="M282,261 L340,261 L610,261 L892,261 L1090,231"/>
  </circle>

  <text class="cap" x="60" y="470">No sensor controls on the device? Applied digitally, every frame.</text>
  <text class="cap" x="60" y="496">Same six controls, real results  <tspan class="acc">→ CameraTier.full</tspan>   ·   macOS + web</text>
</svg>
