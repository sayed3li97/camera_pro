<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1180 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Berkeley Mono','JetBrains Mono','SF Mono',ui-monospace,monospace">
  <title>camera_pro CI matrix</title>
  <desc>Every push runs native.yml across macos-14, ubuntu, windows, and web runners; all pass.</desc>
  <defs><filter id="gc" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
    <style>
      .node{animation:in .5s ease both}@keyframes in{from{opacity:0}to{opacity:1}}
      .chk{animation:chk .4s ease both}@keyframes chk{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
      .t{fill:#cbd2dc;font-size:15px}.s{fill:#6a7482;font-size:11.5px}.cap{fill:#8b93a1;font-size:14px}.acc{fill:#4a9eff}.ok{fill:#3fb950;font-size:14px}
    </style>
  </defs>
  <rect width="1180" height="470" rx="18" fill="#0a0d13"/>
  <rect x="10" y="10" width="1160" height="450" rx="16" fill="none" stroke="#1a2230"/>

  <g class="node" style="animation-delay:.05s">
    <rect x="60" y="200" width="160" height="64" rx="10" fill="#0e131c" stroke="#4a9eff"/>
    <text class="t" x="140" y="228" text-anchor="middle">git push</text>
    <text class="s" x="140" y="248" text-anchor="middle">native.yml</text>
  </g>
  <g stroke="#37414f" fill="none" stroke-width="1.4">
    <path d="M220,220 C 270,220 270,110 320,110"/>
    <path d="M220,228 C 270,228 270,186 320,186"/>
    <path d="M220,236 C 270,236 270,262 320,262"/>
    <path d="M220,244 C 270,244 270,338 320,338"/>
  </g>

  <g class="node" style="animation-delay:.2s"><rect x="320" y="82" width="360" height="56" rx="10" fill="#0e131c" stroke="#2a3442"/><text class="t" x="345" y="107">macos-14</text><text class="s" x="345" y="126">C harness · Apple backend · Metal cross-check</text></g>
  <g class="node" style="animation-delay:.3s"><rect x="320" y="158" width="360" height="56" rx="10" fill="#0e131c" stroke="#2a3442"/><text class="t" x="345" y="183">ubuntu</text><text class="s" x="345" y="202">gcc -Werror · -mssse3 · V4L2 lifecycle</text></g>
  <g class="node" style="animation-delay:.4s"><rect x="320" y="234" width="360" height="56" rx="10" fill="#0e131c" stroke="#2a3442"/><text class="t" x="345" y="259">windows</text><text class="s" x="345" y="278">MSVC /W4 · Media Foundation lifecycle</text></g>
  <g class="node" style="animation-delay:.5s"><rect x="320" y="310" width="360" height="56" rx="10" fill="#0e131c" stroke="#2a3442"/><text class="t" x="345" y="335">web</text><text class="s" x="345" y="354">browser tests · web-app build</text></g>

  <g>
    <g class="chk" style="animation-delay:.9s"><circle cx="720" cy="110" r="15" fill="none" stroke="#3fb950"/><text class="ok" x="720" y="115" text-anchor="middle">✓</text></g>
    <g class="chk" style="animation-delay:1.05s"><circle cx="720" cy="186" r="15" fill="none" stroke="#3fb950"/><text class="ok" x="720" y="191" text-anchor="middle">✓</text></g>
    <g class="chk" style="animation-delay:1.2s"><circle cx="720" cy="262" r="15" fill="none" stroke="#3fb950"/><text class="ok" x="720" y="267" text-anchor="middle">✓</text></g>
    <g class="chk" style="animation-delay:1.35s"><circle cx="720" cy="338" r="15" fill="none" stroke="#3fb950"/><text class="ok" x="720" y="343" text-anchor="middle">✓</text></g>
  </g>

  <circle r="4.5" fill="#4a9eff" filter="url(#gc)"><animateMotion dur="2.6s" repeatCount="indefinite" calcMode="linear" path="M140,232 L270,232 L320,186"/></circle>

  <text class="cap" x="60" y="420">Every push · four runners · <tspan class="ok">all green</tspan>.   <tspan class="acc">the checks in the docs are these runs</tspan></text>
</svg>
